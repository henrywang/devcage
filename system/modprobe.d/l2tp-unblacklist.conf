# Fedora blacklists l2tp_ppp and l2tp_netlink by default because they can be
# auto-loaded by unprivileged users. We load them explicitly via
# modules-load.d/l2tp.conf, so the blacklist is unnecessary here.
#
# See /etc/modprobe.d/l2tp_ppp-blacklist.conf and l2tp_netlink-blacklist.conf
# (installed by RPM) — this file overrides them.
install l2tp_ppp /sbin/modprobe --ignore-install l2tp_ppp
install l2tp_netlink /sbin/modprobe --ignore-install l2tp_netlink
